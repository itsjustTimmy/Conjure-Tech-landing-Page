<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="conjure-style.css">
    <title>The New Conjure Tech</title>
</head>

<body>

    <header class="header">
        <nav class="navbar">
            <div class="logo">CONJURE TECH</div>
            <ul class="nav-links">
                <li><a href="#">Phones</a></li>
                <li><a href="#">Compare</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <a href="#" class="icon-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </a>
                <a href="#" class="icon-btn" aria-label="Cart">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                </a>
            </div>
        </nav>
    </header>

    <section class="hero">

        <!-- Ambient glow blobs -->
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <!-- Big background text -->
        <div class="big-text" aria-hidden="true">
            <span>CONJURE</span>
        </div>

        <!-- Product image -->
        <div class="hero-product">
            <img src="17pm-robot.png" alt="iPhone 17 Pro Max held by robotic hand">
        </div>

        <!-- Info block bottom left -->
        <div class="hero-info">
            <span class="badge">New Drop 2025</span>
            <p class="price">Starting from <strong>₦1,200,000</strong></p>
            <p class="desc">iPhone 17 Pro Max &bull; Pixel 10 Pro XL &bull; S25 Ultra</p>
            <a href="#" class="btn-primary">Shop Now</a>
        </div>

        <!-- Scroll indicator -->
        <div class="scroll-hint">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>

    </section>

</body>
</html>
